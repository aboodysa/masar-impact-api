openapi: 3.0.0
paths:
  /health:
    get:
      operationId: AppController_health
      parameters: []
      responses:
        '200':
          description: API is healthy
      summary: Health check — does not require authentication
      tags:
      - Health
  /api/v1/graph/stats:
    get:
      operationId: GraphController_stats
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphStatsDto'
      security:
      - bearer: []
      summary: Graph statistics — counts per node type
      tags:
      - Graph
  /api/v1/graph/nodes:
    get:
      operationId: GraphController_listNodes
      parameters:
      - name: type
        required: false
        in: query
        description: Filter by node type
        schema:
          example: Screen
          type: string
      - name: limit
        required: false
        in: query
        description: Items per page (max 100)
        schema:
          example: 20
      - name: page
        required: false
        in: query
        description: Page number
        schema:
          example: 1
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphNodesResponse'
        '401':
          description: Unauthorized
      security:
      - bearer: []
      summary: List graph nodes, optionally filtered by type
      tags:
      - Graph
  /api/v1/graph/nodes/{id}:
    get:
      operationId: GraphController_getNode
      parameters:
      - name: id
        required: true
        in: path
        schema:
          type: string
      responses:
        '200':
          description: Node found
        '404':
          description: Node not found
      security:
      - bearer: []
      summary: Get a single graph node by ID
      tags:
      - Graph
  /api/v1/graph/edges:
    get:
      operationId: GraphController_listEdges
      parameters:
      - name: type
        required: false
        in: query
        description: Filter by edge type
        schema:
          example: DEPENDS_ON
          type: string
      - name: limit
        required: false
        in: query
        description: Items per page (max 100)
        schema:
          example: 20
      - name: page
        required: false
        in: query
        description: Page number
        schema:
          example: 1
      responses:
        '200':
          description: ''
      security:
      - bearer: []
      summary: List graph edges, optionally filtered by type
      tags:
      - Graph
  /api/v1/graph/edges/{id}:
    get:
      operationId: GraphController_getEdge
      parameters:
      - name: id
        required: true
        in: path
        schema:
          type: string
      responses:
        '200':
          description: Edge found
        '404':
          description: Edge not found
      security:
      - bearer: []
      summary: Get a single edge by ID
      tags:
      - Graph
  /api/v1/graph/types:
    get:
      operationId: GraphController_nodeTypes
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NodeTypeCount'
      security:
      - bearer: []
      summary: List all node types with counts
      tags:
      - Graph
  /api/v1/impact/analyze:
    post:
      operationId: ImpactController_analyze
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImpactAnalyzeRequest'
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImpactAnalyzeResponse'
        '400':
          description: changeRequest.title is required
      security:
      - bearer: []
      summary: Analyze impact of a change request on services, screens, and integrations
      tags:
      - Impact
  /api/v1/impact/jobs:
    post:
      operationId: ImpactController_createJob
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobRequest'
      responses:
        '201':
          description: Job created
        '400':
          description: title is required
      security:
      - bearer: []
      summary: Create a new async impact analysis job
      tags:
      - Impact
    get:
      operationId: JobsController_list
      parameters:
      - name: limit
        required: false
        in: query
        description: Items per page (max 100)
        schema:
          example: 20
      - name: page
        required: false
        in: query
        description: Page number
        schema:
          example: 1
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobListResponse'
      security:
      - bearer: []
      summary: List all async impact analysis jobs
      tags:
      - Jobs
  /api/v1/impact/search:
    get:
      operationId: ImpactController_search
      parameters:
      - name: q
        required: true
        in: query
        description: Search query (min 2 chars)
        schema:
          example: ترقيات
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: Query too short
      security:
      - bearer: []
      summary: Search across all graph nodes by name or description
      tags:
      - Impact
  /api/v1/impact/jobs/{jobId}:
    get:
      operationId: JobsController_get
      parameters:
      - name: jobId
        required: true
        in: path
        schema:
          example: job-abc123
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetailResponse'
        '404':
          description: Job not found
      security:
      - bearer: []
      summary: Get job status and details
      tags:
      - Jobs
  /api/v1/impact/jobs/{jobId}/result:
    get:
      operationId: JobsController_getResult
      parameters:
      - name: jobId
        required: true
        in: path
        schema:
          example: job-abc123
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResultResponse'
        '404':
          description: Job not found
      security:
      - bearer: []
      summary: Get the result of a completed job
      tags:
      - Jobs
  /api/v1/services/maturity-index:
    get:
      operationId: ServicesController_maturityIndex
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaturityIndexResponse'
      security:
      - bearer: []
      summary: Service maturity index with scoring and domain breakdown
      tags:
      - Services
  /api/v1/services/maturity-index/mermaid:
    get:
      operationId: ServicesController_maturityIndexMermaid
      parameters: []
      responses:
        '200':
          description: ''
      security:
      - bearer: []
      summary: Maturity index as a Mermaid flowchart diagram
      tags:
      - Services
  /api/v1/services:
    get:
      operationId: ServicesController_list
      parameters:
      - name: limit
        required: false
        in: query
        description: Items per page (max 100)
        schema:
          example: 20
      - name: page
        required: false
        in: query
        description: Page number
        schema:
          example: 1
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceListResponse'
      security:
      - bearer: []
      summary: List all services
      tags:
      - Services
  /api/v1/services/{id}:
    get:
      operationId: ServicesController_getById
      parameters:
      - name: id
        required: true
        in: path
        description: 'Service ID (with or without svc: prefix)'
        schema:
          example: svc:wafed
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceDetailResponse'
        '404':
          description: Service not found
      security:
      - bearer: []
      summary: Get service detail with screens, roles, integrations, dependencies,
        documents
      tags:
      - Services
  /api/v1/services/{id}/dependencies:
    get:
      operationId: ServicesController_getDependencies
      parameters:
      - name: id
        required: true
        in: path
        schema:
          example: svc:wafed
          type: string
      responses:
        '200':
          description: Dependencies returned
        '404':
          description: Service not found
      security:
      - bearer: []
      summary: Get service dependencies (dependsOn + dependedBy)
      tags:
      - Services
  /api/v1/services/{id}/impact-path:
    get:
      operationId: ServicesController_getImpactPath
      parameters:
      - name: id
        required: true
        in: path
        schema:
          example: svc:wafed
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImpactPathResponse'
        '404':
          description: Service not found
      security:
      - bearer: []
      summary: Get impact path — screens, fields, actions, and integrations for a
        service
      tags:
      - Services
  /api/v1/mermaid/service/{id}:
    get:
      operationId: MermaidController_serviceArchitecture
      parameters:
      - name: id
        required: true
        in: path
        schema:
          example: svc:wafed
          type: string
      responses:
        '200':
          description: ''
      security:
      - bearer: []
      summary: Generate Mermaid architecture diagram for a service
      tags:
      - Mermaid
  /api/v1/mermaid/dependencies/{id}:
    get:
      operationId: MermaidController_dependencies
      parameters:
      - name: id
        required: true
        in: path
        schema:
          example: svc:wafed
          type: string
      responses:
        '200':
          description: ''
      security:
      - bearer: []
      summary: Generate Mermaid dependency diagram for a service
      tags:
      - Mermaid
  /api/v1/mermaid/search:
    get:
      operationId: MermaidController_search
      parameters:
      - name: q
        required: true
        in: query
        schema:
          example: ترقيات
          type: string
      responses:
        '200':
          description: ''
      security:
      - bearer: []
      summary: Search and visualize matching nodes as Mermaid diagram
      tags:
      - Mermaid
  /api/v1/mermaid/analyze:
    post:
      operationId: MermaidController_analyze
      parameters: []
      responses:
        '201':
          description: ''
      security:
      - bearer: []
      summary: Analyze change impact and return Mermaid diagram
      tags:
      - Mermaid
  /api/v1/mermaid/explore:
    get:
      operationId: MermaidController_explore
      parameters: []
      responses:
        '200':
          description: ''
      security:
      - bearer: []
      summary: Full MASAR service graph as Mermaid diagram
      tags:
      - Mermaid
  /api/v1/external-systems:
    get:
      operationId: ExternalSystemsController_list
      parameters:
      - name: limit
        required: false
        in: query
        description: Items per page (max 100)
        schema:
          example: 20
      - name: page
        required: false
        in: query
        description: Page number
        schema:
          example: 1
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalSystemListResponse'
      security:
      - bearer: []
      summary: List all external systems with integration counts
      tags:
      - External Systems
  /api/v1/external-systems/{id}:
    get:
      operationId: ExternalSystemsController_getById
      parameters:
      - name: id
        required: true
        in: path
        description: 'External system ID (with or without ext: prefix)'
        schema:
          example: ext:nic
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalSystemDetailResponse'
        '404':
          description: External system not found
      security:
      - bearer: []
      summary: Get external system detail with connected services and integrations
      tags:
      - External Systems
info:
  title: MASAR Impact Analysis API
  description: API for impact analysis of MASAR government services. Includes service
    graph traversal, async job processing, and Mermaid diagram generation.
  version: 2.0.0
  contact: {}
tags: []
servers:
- url: https://myapi.businessanalystcrew.org
  description: Production
- url: http://localhost:3000
  description: Local
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
      description: API token from system administrator
  schemas:
    GraphStatsDto:
      type: object
      properties:
        total_nodes:
          type: number
          example: 364
        total_edges:
          type: number
          example: 406
        by_type:
          type: object
          example:
            Service: 25
            Screen: 64
      required:
      - total_nodes
      - total_edges
      - by_type
    GraphNodeRef:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        label:
          type: string
      required:
      - id
      - type
      - label
    GraphNodesResponse:
      type: object
      properties:
        page:
          type: number
          example: 1
        limit:
          type: number
          example: 50
        total:
          type: number
          example: 64
        totalPages:
          type: number
          example: 2
        type:
          type: object
          example: Screen
          nullable: true
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/GraphNodeRef'
      required:
      - page
      - limit
      - total
      - totalPages
      - type
      - nodes
    NodeTypeCount:
      type: object
      properties:
        type:
          type: string
          example: Service
        count:
          type: number
          example: 25
      required:
      - type
      - count
    ChangeRequestInput:
      type: object
      properties:
        title:
          type: string
          example: تعديل شاشة إنهاء التعاقد
        description:
          type: string
          example: إضافة إدخال يدوي لفئة الوظيفة والمسمى الوظيفي
        targetService:
          type: string
          example: svc:wafed
      required:
      - title
    ImpactAnalyzeRequest:
      type: object
      properties:
        changeRequest:
          $ref: '#/components/schemas/ChangeRequestInput'
      required:
      - changeRequest
    ImpactSummary:
      type: object
      properties:
        totalServices:
          type: number
          example: 3
        highImpact:
          type: number
          example: 1
        mediumImpact:
          type: number
          example: 2
        risks:
          type: number
          example: 0
      required:
      - totalServices
      - highImpact
      - mediumImpact
      - risks
    ImpactRisk:
      type: object
      properties:
        type:
          type: string
          example: integration
        severity:
          type: string
          example: high
        description:
          type: string
          example: JICS dependency may cause cascading failures
        recommendation:
          type: string
          example: Review integration contracts before change
      required:
      - type
      - severity
      - description
      - recommendation
    ImpactFinding:
      type: object
      properties:
        type:
          type: string
          example: info
        message:
          type: string
          example: Screen fields map to external system sarf
      required:
      - type
      - message
    ImpactAnalyzeResponse:
      type: object
      properties:
        requestId:
          type: string
          example: REQ-ABC123
        status:
          type: string
          example: completed
        timestamp:
          type: string
        summary:
          $ref: '#/components/schemas/ImpactSummary'
        impacts:
          type: array
          items:
            type: object
        risks:
          type: array
          items:
            $ref: '#/components/schemas/ImpactRisk'
        recommendedActions:
          type: array
          items:
            type: string
        findings:
          type: array
          items:
            $ref: '#/components/schemas/ImpactFinding'
      required:
      - requestId
      - status
      - timestamp
      - summary
      - impacts
      - risks
      - recommendedActions
      - findings
    CreateJobRequest:
      type: object
      properties:
        title:
          type: string
          example: تحليل تأثير تعديل وافد
        description:
          type: string
          example: تغيير شاشة إنهاء التعاقد
        targetService:
          type: string
          example: svc:wafed
      required:
      - title
    SearchResult:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        label:
          type: string
      required:
      - id
      - type
      - label
    SearchResponse:
      type: object
      properties:
        query:
          type: string
          example: ترقيات
        count:
          type: number
          example: 5
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
      required:
      - query
      - count
      - results
    JobDto:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
          example: تحليل تأثير تعديل وافد
        description:
          type: string
        targetService:
          type: string
        status:
          type: string
          example: completed
          enum:
          - queued
          - running
          - completed
          - failed
        progress:
          type: number
          example: 100
        createdAt:
          type: string
        startedAt:
          type: string
        completedAt:
          type: string
        error:
          type: string
        resultId:
          type: string
      required:
      - id
      - title
      - status
      - progress
      - createdAt
    JobListResponse:
      type: object
      properties:
        page:
          type: number
          example: 1
        limit:
          type: number
          example: 50
        total:
          type: number
          example: 2
        totalPages:
          type: number
          example: 1
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/JobDto'
      required:
      - page
      - limit
      - total
      - totalPages
      - jobs
    JobDetailResponse:
      type: object
      properties:
        job:
          $ref: '#/components/schemas/JobDto'
      required:
      - job
    JobResultResponse:
      type: object
      properties:
        result:
          type: object
      required:
      - result
    MaturityEntry:
      type: object
      properties:
        id:
          type: string
        name_ar:
          type: string
        name_en:
          type: string
        domain:
          type: string
        maturity:
          type: string
          example: L4
        impact_readiness:
          type: string
          example: IR-4
        maturity_score:
          type: number
          example: 4
        readiness_score:
          type: number
          example: 4
        maturity_index:
          type: number
          example: 4
        tier:
          type: string
          example: متقدم
      required:
      - id
      - name_ar
      - name_en
      - domain
      - maturity
      - impact_readiness
      - maturity_score
      - readiness_score
      - maturity_index
      - tier
    MaturityIndexResponse:
      type: object
      properties:
        overall_index:
          type: number
          example: 3.04
        tier:
          type: string
          example: متوسط
        total_services:
          type: number
          example: 25
        distribution:
          type: object
          example:
            L4: 6
            L3: 14
            L2: 5
        readiness:
          type: object
          example:
            IR-4: 2
            IR-3: 22
            IR-2: 1
        by_domain:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MaturityByDomain'
        entries:
          type: array
          items:
            $ref: '#/components/schemas/MaturityEntry'
      required:
      - overall_index
      - tier
      - total_services
      - distribution
      - readiness
      - by_domain
      - entries
    ServiceListItem:
      type: object
      properties:
        id:
          type: string
          example: svc:wafed
        name_ar:
          type: string
          example: تأييد التعاقد لغير السعوديين - وافد
        name_en:
          type: string
          example: Contract Endorsement for Non-Saudis - WAFED
        description:
          type: object
        domain:
          type: string
          example: Employment
        maturity:
          type: string
          example: L4
        impact_readiness:
          type: string
          example: IR-4
      required:
      - id
      - name_ar
      - name_en
      - domain
      - maturity
      - impact_readiness
    ServiceListResponse:
      type: object
      properties:
        page:
          type: number
          example: 1
        limit:
          type: number
          example: 20
        total:
          type: number
          example: 25
        totalPages:
          type: number
          example: 2
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceListItem'
      required:
      - page
      - limit
      - total
      - totalPages
      - services
    ScreenDto:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          example: تقديم طلب تعاقد
        type:
          type: string
          example: FORM
      required:
      - id
      - name
      - type
    RoleDto:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          example: مختص جهة حكومية
        scope:
          type: string
          example: Government
      required:
      - id
      - name
      - scope
    IntegrationDto:
      type: object
      properties:
        name:
          type: string
          example: JICS Integration - WAFED
        direction:
          type: string
          example: BIDIRECTIONAL
        systems:
          example:
          - النظام المركزي
          type: array
          items:
            type: string
      required:
      - name
      - direction
      - systems
    DependencyRef:
      type: object
      properties:
        id:
          type: string
          example: svc:jics
        name:
          type: string
          example: النظام المركزي
      required:
      - id
      - name
    DependenciesDto:
      type: object
      properties:
        dependsOn:
          type: array
          items:
            $ref: '#/components/schemas/DependencyRef'
        dependedBy:
          type: array
          items:
            $ref: '#/components/schemas/DependencyRef'
      required:
      - dependsOn
      - dependedBy
    DocumentRef:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          example: وثيقة معمارية الحل - وافد
        version:
          type: string
          example: '1.0'
      required:
      - id
      - name
      - version
    ServiceDetailResponse:
      type: object
      properties:
        service:
          type: object
        screens:
          type: array
          items:
            $ref: '#/components/schemas/ScreenDto'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/RoleDto'
        integrations:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationDto'
        dependencies:
          $ref: '#/components/schemas/DependenciesDto'
        documents:
          type: array
          items:
            $ref: '#/components/schemas/DocumentRef'
      required:
      - service
      - screens
      - roles
      - integrations
      - dependencies
      - documents
    ImpactPathResponse:
      type: object
      properties:
        service:
          type: object
        path:
          type: object
      required:
      - service
      - path
    ExternalSystemListItem:
      type: object
      properties:
        id:
          type: string
          example: ext:nic
        name_ar:
          type: string
          example: مركز المعلومات الوطني
        name_en:
          type: string
        connected_services:
          example:
          - svc:wafed
          - svc:bayan
          type: array
          items:
            type: string
        integration_count:
          type: number
          example: 15
      required:
